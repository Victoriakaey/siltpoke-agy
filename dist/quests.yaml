sideQuests:
  - id: sq-chat-del
    type: bug
    chapter: Chat
    color: sky
    title: Deleting one chat-history row closes the whole list
    desc: Tapping a single history row's delete collapses the entire history panel back to chat view instead of deleting just that row. Suspected missing stopPropagation / reused close-history toggle.
    found: "STATUS Icebox 2026-06-24 (user live); src/web/client/islands/floating-chat.ts"
  - id: sq-rubric-noise
    type: bug
    chapter: Critic
    color: terra
    title: Deterministic rubric flag re-emitted every Stop (noise)
    desc: The critic re-surfaces the same god-file/god-function rubric flag turn after turn (~1002 near-identical) — pure noise, not something episodic memory fixes. Cheap deterministic suppress (rule+file+symbol unchanged → skip).
    found: STATUS Icebox 2026-06-24, from memory-T2 Q1 spike
  - id: sq-stale-signal
    type: bug
    chapter: Daemon
    color: sky
    title: daemon-staleness signal over-reports (alarm fatigue)
    desc: "The 'N commits behind' banner compares git SHA not served bytes, so doc-only commits and rebuild-without-restart both trip it — cries wolf until the one real stale-fix gets ignored. Fix: count only src/ commits, or compare loaded-source/bundle hash."
    found: "STATUS Icebox 2026-06-14, follow-up to #135"
  - id: sq-ledger-loss
    type: bug
    chapter: Daemon
    color: sky
    title: Cost-ledger lost if registry persist() throws on write
    desc: taskRegistry.finish()→persist()→atomicWrite() has no error handling; a disk-full/permission failure skips the appendUsageEvent, so a paid Brain run completes but its usage-events entry vanishes (the invisible-burn class).
    found: STATUS Icebox 2026-06-09, M3.2 independent reviewer (MEDIUM)
  - id: sq-picker-deadend
    type: bug
    chapter: Dashboard
    color: egg2
    title: Picker dead-ends on daemon's launch dir when unindexed
    desc: /repo-graph SSR default = proj_hash of the daemon's cwd; a global daemon launched from an arbitrary dir resolves to an unindexed hash → 'No graph indexed' dead-end even with good indexes in the dropdown. Fall back to most-recently-indexed.
    found: "STATUS Icebox 2026-06-08 (read-only diagnosis); src/web/routes/repo-graph.tsx:136"
  - id: sq-calls-edge
    type: bug
    chapter: Repo Graph
    color: moss
    title: calls-edge substrate — bare-name resolution + test-file call tracking
    desc: Graph calls edges are bare-name strings (~31% repo-resolved); the paid eval showed graph loses to grep partly because it under-traces test-file callers. Fix = resolve names→node-ids at index time + resolve test-file call sites.
    found: STATUS Icebox 2026-06-22, from PR-B eval
  - id: sq-deeplink
    type: idea
    chapter: Repo Graph
    color: moss
    title: URL deep-linking / drill-state sync
    desc: "repo-graph drill state is client-only — a refresh drops back to the un-drilled default. Sync the viewed node into the URL (?node=…) ↔ island both ways: refresh restores view, deep-link to any node, unblocks chat 'return to node'."
    found: STATUS Icebox 2026-06-23, from phase-2c chat smoke
  - id: sq-graph-chat
    type: idea
    chapter: Chat
    color: sky
    title: Graph-level / whole-graph chat
    desc: Floating chat is only node-aware (anchor = selected node); no entry to ask about the whole architecture ('how does this connect?'). Add a whole-graph anchor tier + graph-summary packing (too big to feed raw). ~one companion-loop track.
    found: STATUS Icebox 2026-06-23, from phase-2c chat smoke
  - id: sq-spaced
    type: idea
    chapter: Memory Book
    color: violet
    title: Spaced / interleaved retrieval (temporal axis)
    desc: "siltpoke has the knowledge substrate + retrieval-at-write-time but nothing re-surfaces past understanding over time. The pet occasionally pokes 'two weeks ago you wrote X — remember why Y not Z?' = spaced retrieval. Hard rule: curiosity, zero scoreboard."
    found: STATUS Icebox 2026-06-22, from mattpocock teach skill
  - id: sq-comprehension
    type: idea
    chapter: Chat
    color: sky
    title: Proactive comprehension nudge after a big AI diff
    desc: "Flip one comprehension touch from pull → gentle push: after a large diff lands, the pet lightly pokes 'do you get this?', framed as curiosity (not critic, not graded). Gated on answering the explain pull-vs-value question first."
    found: STATUS Icebox 2026-06-23, from Linus Torvalds talk
  - id: sq-community
    type: idea
    chapter: Repo Graph
    color: moss
    title: Community detection on the repo-graph
    desc: "Borrow Leiden/Louvain (deterministic, $0) over the existing graph: (1) community-sliced subgraphs for sharper/smaller explain Brain inputs; (2) free post-index products (god-node list, suggested questions, surprising connections)."
    found: STATUS Icebox 2026-06-09, from a Graphify walkthrough
  - id: sq-incremental
    type: idea
    chapter: Repo Graph
    color: moss
    title: Commit-hook incremental rebuild of the repo-graph
    desc: fingerprints (diff substrate) already ship but there's no 'on commit → incremental update' wire. A post-commit/post-merge trigger re-indexes only fingerprint-changed files, keeping the graph live without a full /siltpoke-index.
    found: STATUS Icebox 2026-06-09, from Graphify hook install
